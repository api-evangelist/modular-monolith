name: Modular Monolith
description: An architectural pattern that structures a monolithic application into
  loosely coupled, well-defined modules with clear boundaries and dependencies, combining
  the operational simplicity of a monolith with the organizational benefits of modular
  design. Organizations adopt it to address specific technical or business challenges
  in their environments.
